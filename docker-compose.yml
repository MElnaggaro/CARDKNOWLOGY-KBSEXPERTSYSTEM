version: '3.8'

services:
  # Backend API (Flask + AI Agent)
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ./Backend/data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - FLASK_ENV=development
      - OPENAI_API_KEY=${OPENAI_API_KEY:-your_key_here}

  # Frontend (Static files served via Nginx)
  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./Frontend:/usr/share/nginx/html
    depends_on:
      - backend
